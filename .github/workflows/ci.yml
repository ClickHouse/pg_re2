name: ✅ CI
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  schedule:
    - cron:  '0 12 10 * *' # Monthly at noon on the tenth
jobs:
  format:
    runs-on: ubuntu-latest
    name: 🔎 Lint Code
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format-22
        run: sudo make apt-install-tools
      - name: Check clang-format
        run: make lint22

  build:
    strategy:
      fail-fast: false
      matrix:
        pg: [18, 17, 16, 15, 14, 13]
    name: 🐘 PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - run: pg-start ${{ matrix.pg }} libre2-dev
      - uses: actions/checkout@v6
      - run: pg-build-test
